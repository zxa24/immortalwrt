name: build xr1710g (immortalwrt)

# 官方 ImmortalWrt 树 + 移植进来的 xr1710g 设备支持。
# 干净一致基线,无第三方定制包;econet board 名已写进 an7581.mk 的 SUPPORTED_DEVICES。

on:
  workflow_dispatch:
    inputs:
      device:
        description: 设备
        required: true
        type: choice
        default: gemtek_xr1710g-ubi
        options:
          - gemtek_xr1710g-ubi
          - gemtek_w1700k-ubi
      docker:
        description: 编入 Docker(dockerd + docker CLI + dockerman 面板)
        required: false
        type: boolean
        default: false

concurrency:
  group: build-xr1710g-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    env:
      DEBIAN_FRONTEND: noninteractive
      DEVICE: ${{ inputs.device }}
      DOCKER: ${{ inputs.docker }}
      DL_DIR: ${{ github.workspace }}/dl
      CCACHE_DIR: ${{ github.workspace }}/.ccache
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 释放磁盘空间
        run: |
          set -uxo pipefail
          echo "==== 清理前 ===="; df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/.ghcup \
                      /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          sudo docker image prune --all --force || true
          echo "==== 清理后 ===="; df -h /

      - name: 修复脚本权限
        run: |
          set -euxo pipefail
          find scripts -type f -exec chmod +x {} +
          chmod +x config/check-*.sh 2>/dev/null || true

      - name: 安装依赖
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            build-essential bison ccache clang curl fastjar flex gawk gettext \
            git gcc-multilib g++-multilib libelf-dev libncurses5-dev libssl-dev \
            libpython3-dev patch pkg-config python3 python3-distutils python3-pip \
            python3-setuptools qemu-utils rsync subversion swig unzip vim wget \
            xsltproc zlib1g-dev zstd
          python3 -m pip install --upgrade pip
          python3 -m pip install pyelftools

      - name: 缓存下载与 ccache
        uses: actions/cache@v4
        with:
          path: |
            dl
            .ccache
          key: ${{ runner.os }}-iw-${{ inputs.device }}-${{ hashFiles('feeds.conf.default', 'target/linux/airoha/**') }}
          restore-keys: |
            ${{ runner.os }}-iw-${{ inputs.device }}-

      - name: 更新 feeds
        run: |
          set -euxo pipefail
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 生成配置
        run: |
          set -euxo pipefail
          # OpenWrt 设备 kconfig 符号保留连字符,直接用 $DEVICE(勿把 -ubi 的连字符换成下划线)
          printf '%s\n' \
            'CONFIG_TARGET_airoha=y' \
            'CONFIG_TARGET_airoha_an7581=y' \
            "CONFIG_TARGET_airoha_an7581_DEVICE_${DEVICE}=y" \
            'CONFIG_CCACHE=y' \
            'CONFIG_PACKAGE_luci=y' \
            'CONFIG_PACKAGE_luci-i18n-base-zh-cn=y' > .config
          # 可选:编入 Docker(workflow_dispatch 勾选 docker 时)
          if [ "${DOCKER:-false}" = "true" ]; then
            echo "==== 编入 Docker 包 ===="
            printf '%s\n' \
              'CONFIG_PACKAGE_dockerd=y' \
              'CONFIG_PACKAGE_docker=y' \
              'CONFIG_PACKAGE_luci-app-dockerman=y' \
              'CONFIG_PACKAGE_luci-i18n-dockerman-zh-cn=y' >> .config
          fi
          make defconfig
          echo "==== 确认 luci 进入配置 ===="
          grep -E "^CONFIG_PACKAGE_luci=y" .config || { echo "!! luci 未选中"; exit 1; }
          if [ "${DOCKER:-false}" = "true" ]; then
            echo "==== 确认 dockerd 进入配置(defconfig 可能因依赖缺失静默丢包) ===="
            grep -E "^CONFIG_PACKAGE_dockerd=y" .config || { echo "!! dockerd 未选中"; exit 1; }
          fi
          echo "==== 确认设备被选中(找不到就 dump 所有 DEVICE 符号供诊断) ===="
          grep "^CONFIG_TARGET_airoha_an7581_DEVICE_${DEVICE}=y" .config \
            || { echo "!! 未选中 $DEVICE,现有 DEVICE 符号如下:"; grep -E "CONFIG_TARGET_airoha_an7581_DEVICE_" .config; exit 1; }

      - name: 下载源码
        run: |
          set -euxo pipefail
          make download -j"$(nproc)"

      - name: 编译固件
        run: |
          set -uxo pipefail
          make -j"$(nproc)" || {
            echo "==== 并行失败,回退 -j1 V=s 定位真因 ===="
            make -j1 V=s
          }

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ inputs.device }}
          path: |
            bin/targets/airoha/an7581/**
          if-no-files-found: error
          retention-days: 30
